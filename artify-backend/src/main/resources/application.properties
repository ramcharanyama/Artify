spring.application.name=artify-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/artify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:YXJ0aWZ5X2RlZmF1bHRfand0X3NlY3JldF9rZXlfZm9yX2Rldl9vbmx5X2NoYW5nZV9pbl9wcm9k}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${SERVER_PORT:8080}
